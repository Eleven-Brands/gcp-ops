name: Sync Engineering Standards

on:
  workflow_dispatch:
    inputs:
      standards_ref:
        description: "Branch or tag from engineering standards repo"
        required: false
        default: "main"

  repository_dispatch:
    types: [engineering-standards-updated]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-engineering-standards
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Sync engineering standards
        env:
          STANDARDS_REPO: Eleven-Brands/eleven-brands-engineering-standards
          STANDARDS_REF: ${{ github.event.client_payload.ref || github.event.inputs.standards_ref || 'main' }}
          GITHUB_TOKEN: ${{ secrets.STANDARDS_REPO_TOKEN }}
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          bash scripts/sync_engineering_standards.sh

      - name: Sync shared workflows
        env:
          STANDARDS_REF: ${{ github.event.client_payload.ref || github.event.inputs.standards_ref || 'main' }}
          GITHUB_TOKEN: ${{ secrets.STANDARDS_REPO_TOKEN }}
        run: |
          mkdir -p .github/workflows
          gh api "repos/Eleven-Brands/eleven-brands-engineering-standards/contents/.github/workflows/create-clickup-task.yml?ref=${STANDARDS_REF}" \
            --jq '.content' | base64 -d > .github/workflows/create-clickup-task.yml

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.STANDARDS_PR_TOKEN }}
          base: main
          branch: chore/sync-engineering-standards
          delete-branch: true
          title: "chore: sync engineering standards"
          commit-message: "chore: sync engineering standards"
          body: |
            This PR syncs shared engineering standards files from:
            - Eleven-Brands/eleven-brands-engineering-standards @ `${{ github.event.client_payload.ref || github.event.inputs.standards_ref || 'main' }}`

            Synced items:
            - CODE_OF_CONDUCT.md
            - CONTRIBUTING.md
            - LICENSE
            - setup_gcp.md
            - setup_local_development.md
            - .github (enforced from standards repo)
            - .github/workflows/create-clickup-task.yml
          labels: |
            automation
            docs
          add-paths: |
            .github
            CODE_OF_CONDUCT.md
            CONTRIBUTING.md
            LICENSE
            setup_gcp.md
            setup_local_development.md
